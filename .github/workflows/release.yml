name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag and manifest version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./manifest.json').version")"
          MIN_APP_VERSION="$(node -p "require('./manifest.json').minAppVersion")"
          VERSION_MIN_APP="$(node -p "require('./versions.json')[require('./manifest.json').version] || ''")"
          if ! echo "$TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag must be a plain numeric semantic version, for example 1.12.4. Do not prefix it with v."
            exit 1
          fi
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag ($TAG) must match manifest.json version ($VERSION)."
            exit 1
          fi
          if [ -z "$VERSION_MIN_APP" ]; then
            echo "versions.json must include an entry for $VERSION."
            exit 1
          fi
          if [ "$VERSION_MIN_APP" != "$MIN_APP_VERSION" ]; then
            echo "versions.json entry for $VERSION ($VERSION_MIN_APP) must match manifest minAppVersion ($MIN_APP_VERSION)."
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Verify release assets
        run: |
          test -f manifest.json
          test -f main.js
          test -f styles.css

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            manifest.json
            main.js
            styles.css

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            Bragi Canvas ${{ github.ref_name }}.

            This release was built by GitHub Actions from the tagged source commit.
            Release assets:
            - manifest.json
            - main.js
            - styles.css
          fail_on_unmatched_files: true
          files: |
            manifest.json
            main.js
            styles.css
